# 复制到分类模型仓：.github/workflows/infer_fruit.yml
# App 契约：incoming/{category|growth|disease}/.../uploads/*.jpg + 同名 *.afsa.json

name: Fruit classification (MobileNet V3)

on:
  push:
    branches: [main]
    paths:
      - 'incoming/**'
      - '!incoming/**/*.afsa.json'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  infer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Route by sidecar (.afsa.json)
        id: route
        env:
          AFSA_SCAN_ALL: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python3 .github/scripts/afsa_resolve_sidecar.py

      - name: Mark repo kind
        run: mkdir -p out && echo classify > out/afsa_repo_kind.txt

      - name: Prepare category-only staging
        if: contains(steps.route.outputs.task_types, 'fruit_category')
        run: python3 .github/scripts/afsa_prepare_infer_staging.py

      - name: POST 新图片到自建服务器（可选）
        env:
          UPLOAD_URL: ${{ secrets.FRUIT_SERVER_UPLOAD_URL }}
          UPLOAD_TOKEN: ${{ secrets.FRUIT_SERVER_UPLOAD_TOKEN }}
        run: |
          if [ -z "$UPLOAD_URL" ]; then exit 0; fi
          collect_files() {
            if [ -d /tmp/afsa_infer_staging/incoming ]; then
              find /tmp/afsa_infer_staging -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.webp' -o -iname '*.bmp' \) 2>/dev/null
              return
            fi
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              find incoming -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.webp' -o -iname '*.bmp' \) 2>/dev/null
            fi
          }
          N=0
          while IFS= read -r f; do
            [ -z "$f" ] || [ ! -f "$f" ] && continue
            curl -fsS -X POST "$UPLOAD_URL" \
              ${UPLOAD_TOKEN:+ -H "Authorization: Bearer $UPLOAD_TOKEN"} \
              -F "file=@${f}" -F "path=${f}" -F "commit=${{ github.sha }}" -F "repo=${{ github.repository }}" \
              && N=$((N+1)) || echo "::warning::上传失败: $f"
          done < <(collect_files)
          echo "已转发 ${N} 个文件。"

      - uses: actions/setup-python@v5
        if: contains(steps.route.outputs.task_types, 'fruit_category')
        with:
          python-version: '3.11'

      - name: Install PyTorch (CPU)
        if: contains(steps.route.outputs.task_types, 'fruit_category')
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install pillow timm

      # 将下一行 --weights 换成各仓实际权重路径
      - name: Run fruit category inference
        if: contains(steps.route.outputs.task_types, 'fruit_category')
        run: |
          INCOMING_DIR="/tmp/afsa_infer_staging"
          if [ ! -d "$INCOMING_DIR/incoming" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INCOMING_DIR="incoming"
          fi
          python scripts/infer_fruit.py \
            --weights models/mobilenet_fruit_cls_best.pt \
            --incoming "$INCOMING_DIR" \
            --output output/predictions_partial.json

      - name: Write predictions.json (App 匹配字段)
        if: always()
        run: python3 .github/scripts/afsa_write_predictions.py

      - name: Summary
        if: always() && hashFiles('output/predictions.json') != ''
        run: |
          echo "## AFSA 推理结果" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat output/predictions.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: predictions
          path: output/predictions.json
          if-no-files-found: ignore
